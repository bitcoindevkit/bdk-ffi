[package]
edition = "2021"
rust-version = "1.84.0"
name = "bdk_kyoto"
version = "0.15.4"
authors = [
    "Rob rob@2140.dev",
    "Bitcoin Dev Kit Developers",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "BDK blockchain integration using P2P light client Kyoto"
documentation = "https://docs.rs/bdk-kyoto"
readme = "README.md"
keywords = [
    "bitcoin",
    "peer-to-peer",
    "light-client",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/bitcoindevkit/bdk-kyoto"

[lib]
name = "bdk_kyoto"
path = "src/lib.rs"

[dependencies.bdk_wallet]
version = "3.0.0-rc.1"

[dependencies.bip157]
version = "0.3.4"
